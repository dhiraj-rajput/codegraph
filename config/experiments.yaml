# Experiment configuration
# Used by scripts/run_experiment.py

experiment:
  name: "vectorless_rag_v1"
  description: "Comparing Vector, Vectorless, and Hybrid RAG on codebases"

# Parser settings
parser:
  supported_extensions: [".py", ".js", ".ts"]
  max_file_size_bytes: 1000000
  max_function_tokens: 512

# Retrieval settings
retriever:
  top_k: 10
  graph_depth: 2
  
  # Vectorless weights (System B)
  vectorless:
    bm25_weight: 0.4
    symbol_weight: 0.3
    graph_weight: 0.3
  
  # Hybrid weights (System C)
  hybrid:
    bm25_weight: 0.5
    vector_weight: 0.3
    graph_weight: 0.2

# Embedding settings (100% free, 100% local via HuggingFace)
# Models are auto-downloaded on first use (~500MB-1.5GB depending on model)
embedding:
  # Available model keys (see indexer/vector_index.py EMBEDDING_MODELS):
  #   "nomic-code"  → nomic-ai/nomic-embed-code        (768d, 8192 tok, BEST FOR CODE)
  #   "bge-m3"      → BAAI/bge-m3                      (1024d, 8192 tok, hybrid-ready)
  #   "nomic-text"  → nomic-ai/nomic-embed-text-v2-moe (768d, MoE)
  #   "bge-base"    → BAAI/bge-base-en-v1.5            (768d, 512 tok)
  #   "minilm"      → all-MiniLM-L6-v2                 (384d, 256 tok, CPU-friendly)
  model_key: "nomic-code"
  batch_size: 32

# LLM settings
llm:
  provider: "openai"
  model: "gpt-4o"
  temperature: 0.0
  max_tokens: 2048
  token_budget: 4000

# Evaluation settings
evaluation:
  recall_k: [1, 5, 10]
  precision_k: [5, 10]
  ndcg_k: [5, 10]
  judge_model: "gpt-4o"
  bootstrap_samples: 10000
  significance_level: 0.05

# Ablation configurations (8 experiments)
ablation:
  - id: E1
    name: "BM25 only"
    components: [bm25]
    weights: { bm25: 1.0, symbol: 0.0, graph: 0.0, vector: 0.0 }

  - id: E2
    name: "BM25 + Symbol"
    components: [bm25, symbol]
    weights: { bm25: 0.6, symbol: 0.4, graph: 0.0, vector: 0.0 }

  - id: E3
    name: "BM25 + Graph"
    components: [bm25, graph]
    weights: { bm25: 0.6, symbol: 0.0, graph: 0.4, vector: 0.0 }

  - id: E4
    name: "BM25 + Symbol + Graph"
    components: [bm25, symbol, graph]
    weights: { bm25: 0.4, symbol: 0.3, graph: 0.3, vector: 0.0 }

  - id: E5
    name: "Vector only"
    components: [vector]
    weights: { bm25: 0.0, symbol: 0.0, graph: 0.0, vector: 1.0 }

  - id: E6
    name: "Vector + Graph"
    components: [vector, graph]
    weights: { bm25: 0.0, symbol: 0.0, graph: 0.3, vector: 0.7 }

  - id: E7
    name: "Hybrid (BM25 + Vector)"
    components: [bm25, vector]
    weights: { bm25: 0.5, symbol: 0.0, graph: 0.0, vector: 0.5 }

  - id: E8
    name: "Hybrid (full)"
    components: [bm25, symbol, graph, vector]
    weights: { bm25: 0.35, symbol: 0.15, graph: 0.15, vector: 0.35 }
